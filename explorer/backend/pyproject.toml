[tool.ruff]
target-version = "py310"
line-length = 100
src = ["app", "core", "schemas", "services", "tests"]
exclude = [
  ".venv",
  "data",
  "__pycache__",
]

[tool.ruff.lint]
select = ["E9", "F63", "F7", "F82"]

[tool.ruff.lint.isort]
known-first-party = ["app", "core", "schemas", "services"]

[tool.mypy]
python_version = "3.10"
files = ["app", "core", "schemas", "services", "tests"]
ignore_missing_imports = true
follow_imports = "silent"
check_untyped_defs = false
warn_unused_ignores = true
warn_redundant_casts = true
pretty = true
show_error_codes = true
disable_error_code = [
  "assignment",
  "arg-type",
  "attr-defined",
  "call-overload",
  "import-untyped",
  "misc",
  "union-attr",
  "var-annotated",
]
exclude = "(^data/|^\\.venv/|^tests/__pycache__/)"
