version: "3.9"

# ─── Volumes ────────────────────────────────────────────────────────────────
volumes:
  ollama_data:
  bag_data:
  faiss_data:
  sites_data:

# ─── Services ───────────────────────────────────────────────────────────────
services:

  # ── Ollama (local LLM) ────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: amr_ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Backend (FastAPI) ─────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: amr_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434/v1
      - BAG_UPLOAD_DIR=/app/data/bags
      - SITES_ROOT=/app/data/sites
      - FAISS_PATH=/app/data/faiss.index
      - META_PATH=/app/data/metadata.json
      - SOOTBALLS_REPO_ROOT=/app/sootballs_sites
      - SOOTBALLS_SITES_ROOT=/app/sootballs_sites/sites
      - GIT_CONFIG_COUNT=1
      - GIT_CONFIG_KEY_0=safe.directory
      - GIT_CONFIG_VALUE_0=/app/sootballs_sites
    volumes:
      - bag_data:/app/data/bags
      - faiss_data:/app/data
      - sites_data:/app/data/sites
      - /home/mithileash/catkin_ws/src/sootballs_sites:/app/sootballs_sites:ro
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "2"]
    depends_on:
      ollama:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 20s
      timeout: 10s
      retries: 5

  # ── Frontend (Next.js) ────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://nginx/api  # resolved by nginx at runtime
    container_name: amr_frontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000  # browser-side fallback
    depends_on:
      - backend
    ports:
      - "3000:3000"

  # ── nginx reverse proxy ───────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: amr_nginx
    restart: unless-stopped
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend
